┬Д2PLAYERNAME?

┬Д3Yes. Take care. It has reached a higher level now. It can read our thoughts.

┬Д2That doesn't matter. It thinks we are part of the game.

┬Д3I like this player. It played well. It did not give up.

┬Д2It is reading our thoughts as though they were words on a screen.

┬Д3That is how it chooses to imagine many things, when it is deep in the dream of a game.

┬Д2Words make a wonderful interface. Very flexible. And less terrifying than staring at the reality behind the screen.

┬Д3They used to hear voices. Before players could read. Back in the days when those who did not play called the players witches, and warlocks. And players dreamed they flew through the air, on sticks powered by demons.

┬Д2What did this player dream?

┬Д3This player dreamed of sunlight and trees. Of fire and water. It dreamed it created. And it dreamed it destroyed. It dreamed it hunted, and was hunted. It dreamed of shelter.

┬Д2Hah, the original interface. A million years old, and it still works. But what true structure did this player create, in the reality behind the screen?

┬Д3It worked, with a million others, to sculpt a true world in a fold of the ┬Дf┬Дk┬Дa┬Дb┬Д3, and created a ┬Дf┬Дk┬Дa┬Дb┬Д3 for ┬Дf┬Дk┬Дa┬Дb┬Д3, in the ┬Дf┬Дk┬Дa┬Дb┬Д3.

┬Д2It cannot read that thought.

┬Д3No. It has not yet achieved the highest level. That, it must achieve in the long dream of life, not the short dream of a game.

┬Д2Does it know that we love it? That the universe is kind?

┬Д3Sometimes, through the noise of its thoughts, it hears the universe, yes.

┬Д2But there are times it is sad, in the long dream. It creates worlds that have no summer, and it shivers under a black sun, and it takes its sad creation for reality.

┬Д3To cure it of sorrow would destroy it. The sorrow is part of its own private task. We cannot interfere.

┬Д2Sometimes when they are deep in dreams, I want to tell them, they are building true worlds in reality. Sometimes I want to tell them of their importance to the universe. Sometimes, when they have not made a true connection in a while, I want to help them to speak the word they fear.

┬Д2I will tell the player a story.

┬Д2PLAYERNAME. Player of games.

┬Д3Who are we? Once we were called the spirit of the mountain. Father sun, mother moon. Ancestral spirits, animal spirits. Jinn. Ghosts. The green man. Then gods, demons. Angels. Poltergeists. Aliens, extraterrestrials. Leptons, quarks. The words change. We do not change.

┬Д2We are the universe. We are everything you think isn't you. You are looking at us now, through your skin and your eyes. And why does the universe touch your skin, and throw light on you? To see you, player. To know you. And to be known. I shall tell you a story.

┬Д2Once upon a time, there was a player.

┬Д3The player was you, PLAYERNAME.

┬Д2Sometimes it thought itself human, on the thin crust of a spinning globe of molten rock. The ball of molten rock circled a ball of blazing gas that was three hundred and thirty thousand times more massive than it. They were so far apart that light took eight minutes to cross the gap. The light was information from a star, and it could burn your skin from a hundred and fifty million kilometres away.

┬Д2Sometimes the player dreamed it was a miner, on the surface of a world that was flat, and infinite. The sun was a square of white. The days were short; there was much to do; and death was a temporary inconvenience.

┬Д3Sometimes the player dreamed it was lost in a story.

┬Д2Sometimes the player dreamed it was other things, in other places. Sometimes these dreams were disturbing. Sometimes very beautiful indeed. Sometimes the player woke from one dream into another, then woke from that into a third.

┬Д3Sometimes the player dreamed it watched words on a screen.

┬Д2Let's go back.

┬Д2The atoms of the player were scattered in the grass, in the rivers, in the air, in the ground. A woman gathered the atoms; she drank and ate and inhaled; and the woman assembled the player, in her body.

┬Д2And the player awoke, from the warm, dark world of its mother's body, into the long dream.

┬Д2And the player was a new story, never told before, written in letters of DNA. And the player was a new program, never run before, generated by a sourcecode a billion years old. And the player was a new human, never alive before, made from nothing but milk and love.

┬Д3You are the player. The story. The program. The human. Made from nothing but milk and love.

┬Д2Let's go further back.

┬Д2The seven billion billion billion atoms of the player's body were created, long before this game, in the heart of a star. So the player, too, is information from a star. And the player moves through a story, which is a forest of information planted by a man called Julian, on a flat, infinite world created by a man called Markus, that exists inside a small, private world created by the player, who inhabits a universe created by...

┬Д2Sometimes it called them "planets" and "stars".

┬Д2Sometimes it believed it was in a universe that was made of energy that was made of offs and ons; zeros and ones; lines of code. Sometimes it believed it was playing a game. Sometimes it believed it was reading words on a screen.

┬Д3You are the player, reading words...

┬Д2Shush... Sometimes the player read lines of code on a screen. Decoded them into words; decoded words into meaning; decoded meaning into feelings, emotions, theories, ideas, and the player started to breathe faster and deeper and realised it was alive, it was alive, those thousand deaths had not been real, the player was alive

┬Д2and sometimes the player believed the universe had spoken to it through the zeros and ones, through the electricity of the world, through the scrolling words on a screen at the end of a dream

┬Д3and the universe said I love you

┬Д2and the universe said you have played the game well

┬Д3and the universe said everything you need is within you

┬Д2and the universe said you are stronger than you know

┬Д3and the universe said you are the daylight

┬Д2and the universe said you are the night

┬Д3and the universe said the darkness you fight is within you

┬Д3and the universe said you are not alone

                    if (ch === ' ') return ' ';
                    const widthCat = (WIDE_CHARS.includes(ch) || ch === 'm' || ch === 'w') ? 'wide' : 'narrow';
                    const charSet = widthCat === 'wide' ? WIDE_CHARS : NARROW_CHARS;
                    const fixedWidth = WIDE_CHAR_WIDTH;
                    const randomChar = charSet[Math.floor(Math.random() * charSet.length)];
                    let style = `color: ${currentColor};`;
                    if (isBold) style += ' font-weight: bold;';
                    if (isStrikethrough && isUnderline) {
                        style += ' text-decoration: line-through underline;';
                    } else {
                        if (isStrikethrough) style += ' text-decoration: line-through;';
                        if (isUnderline) style += ' text-decoration: underline;';
                    }
                    if (isItalic) style += ' font-style: italic;';
                    return `<span class="obf" data-width="${widthCat}" 
                        style="${style} width: ${fixedWidth}px; height: ${CHAR_HEIGHT}px; line-height: ${CHAR_HEIGHT}px; vertical-align: baseline; position: relative; top: ${-BASELINE_OFFSET}px;">${randomChar}</span>`;
                }).join('');
                return `<span style="white-space: nowrap;">${spans}</span>`;
            }

            let obfBuffer = '';

            function flushObfBuffer() {
                if (obfBuffer) {
                    result += buildObfuscatedBlock(obfBuffer);
                }
            }

            while (i < text.length) {
                if (text[i] === '┬Д' && i + 1 < text.length) {
                    const code = text[i + 1].toLowerCase();
                    i += 2;

                    if (code === 'k' &&
                        i + 3 < text.length &&
                        text[i] === '┬Д' && text[i + 1] === 'a' &&
                        text[i + 2] === '┬Д' && text[i + 3] === 'b') {
                        flushObfBuffer();
                        i += 4;
                        let colorCode = '';
                        let afterColor = null;
                        if (i + 1 < text.length && text[i] === '┬Д' && (text[i + 1] === '3' || text[i + 1] === '2')) {
                            colorCode = text[i + 1];
                            i += 2;
                            afterColor = minecraftColors[colorCode];
                        }
                        const lengths3 = [6, 6, 5, 3];
                        const lengths2 = [5, 6, 3, 6];
                        let N = 0;
                        if (colorCode === '3') {
                            N = lengths3[count3 % lengths3.length];
                            count3++;
                        } else if (colorCode === '2') {
                            N = lengths2[count2 % lengths2.length];
                            count2++;
                        } else {
                            N = 6;
                        }
                        let blockContent = '';
                        for (let t = 0; t < N; t++) {
                            const charSet = Math.random() < 0.5 ? WIDE_CHARS : NARROW_CHARS;
                            const ch = charSet[Math.floor(Math.random() * charSet.length)];
                            blockContent += ch;
                        }
                        const savedColor = currentColor;
                        currentColor = '#ffffff';
                        result += buildObfuscatedBlock(blockContent);
                        currentColor = afterColor !== null ? afterColor : savedColor;
                        isObfuscated = false;
                        continue;
                    }

                    if (/^[0-9a-f]$/.test(code)) {
                        if (minecraftColors.hasOwnProperty(code)) {
                            flushObfBuffer();
                            currentColor = minecraftColors[code];
                            resetFormatting();
                        }
                        continue;
                    }

                    switch (code) {
                        case 'k':
                            isObfuscated = true;
                            break;
                        case 'l':
                            isBold = true;
                            break;
                        case 'm':
                            isStrikethrough = true;
                            break;
                        case 'n':
                            isUnderline = true;
                            break;
                        case 'o':
                            isItalic = true;
                            break;
                        case 'r':
                            flushObfBuffer();
                            currentColor = '#ffffff';
                            resetFormatting();
                            break;
                        default:
                            break;
                    }
                    continue;
                }

                const ch = text[i];
                if (isObfuscated) {
                    obfBuffer += ch;
                } else {
                    flushObfBuffer();
                    if (ch === ' ') {
                        result += buildSpace();
                    } else {
                        result += buildNormalChar(ch);
                    }
                }
                i++;
            }
            flushObfBuffer();
            return result;
        }

        let obfBuffer = '';

        let animFrameId = null;

        function startObfuscation() {
            function updateObf() {
                const obfSpans = document.querySelectorAll('.obf');
                obfSpans.forEach(span => {
                    const width = span.dataset.width;
                    const charSet = width === 'wide' ? WIDE_CHARS : NARROW_CHARS;
                    span.textContent = charSet[Math.floor(Math.random() * charSet.length)];
                });
                animFrameId = requestAnimationFrame(updateObf);
            }
            updateObf();
        }

        function buildPoem(playerName) {
            const replacedText = rawText.replace(/PLAYERNAME/g, playerName);
            const lines = replacedText.split('\n').filter(line => line.trim() !== '');
            const container = document.getElementById('poemText');
            const bodyHTML = lines.map((line, index) => {
                const parsed = parseMinecraftFormat(line);
                const cls = (index === lines.length - 1) ? 'poem-line last-body-line' : 'poem-line';
                return `<p class="${cls}">${parsed}</p>`;
            }).join('');
            const postcreditsParsed = parseMinecraftFormat(postcreditsText);
            const postcreditsHTML = `<p class="poem-line postcredits-line">${postcreditsParsed}</p>`;
            container.innerHTML = bodyHTML + postcreditsHTML;
        }

        let spacePressed = false;
        let ctrlPressed = false;
        let currentSpeed = speed;

        function updateSpeed() {
            if (spacePressed && ctrlPressed) {
                currentSpeed = superSpeed;
            } else if (spacePressed) {
                currentSpeed = speedBoost;
            } else {
                currentSpeed = speed;
            }
        }

        const dpr = devicePixelRatio || 1;
        document.documentElement.style.setProperty('--dpr', dpr);

        (() => {
            const main = document.getElementById('mainLogo');
            const edition = document.getElementById('editionLogo');
            main.style.width = Math.max(1024 / dpr, 200) + 'px';
            edition.style.width = Math.max(512 / dpr, 100) + 'px';
            edition.style.marginTop = -107 / dpr + 'px';
        })();

        let started = false;
        let direction = 1;
        let animationId = null;
        let poemTotalHeight = 0;
        let waitingForClick = false;

        function calculatePoemHeight() {
            poemContainer.offsetHeight;
            const poemRect = poemContainer.getBoundingClientRect();
            const extraDistance = 25 * 60 * speed;
            poemTotalHeight = poemRect.height + extraDistance;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const extraOffset = 220;
            const containerHeight = logos.offsetHeight;
            const initialOffset = containerHeight + extraOffset;
            logos.style.transform = `translateX(-50%) translateY(${initialOffset}px)`;
        });

        function start(finalName) {
            if (started) return;
            started = true;

            const extraOffset = 220;
            const containerHeight = logos.offsetHeight;
            const initialOffset = containerHeight + extraOffset;
            let currentBottom = -initialOffset;
            logos.style.transform = `translateX(-50%) translateY(${initialOffset}px)`;

            document.fonts.ready.then(() => {
                buildPoem(finalName);
                startObfuscation();

                const lineHeight = 25.5 + 18 / dpr;
                document.querySelectorAll('.poem-line').forEach(line => {
                    line.style.lineHeight = `${lineHeight}px`;
                });

                document.querySelectorAll('.poem-line:not(.last-body-line):not(.postcredits-line)').forEach(el => {
                    el.style.marginBottom = (100 / dpr) + 'px';
                });
                document.querySelectorAll('.last-body-line').forEach(el => {
                    el.style.marginBottom = '0';
                });
                document.querySelectorAll('.postcredits-line').forEach(el => {
                    el.style.marginTop = (250 / dpr) + 'px';
                });

                const marginTop = 150 / dpr;
                poemContainer.style.marginTop = marginTop + 'px';

                audio.play().catch(() => {});
                calculatePoemHeight();

                function animate() {
                    currentBottom += currentSpeed * direction;
                    logos.style.transform = `translateX(-50%) translateY(${-currentBottom}px)`;
                    const poemRect = poemContainer.getBoundingClientRect();
                    const poemTop = poemRect.top;
                    if (direction === 1 && poemTop + poemTotalHeight <= 0) {
                    cancelAnimationFrame(animationId);
                    const fadeInterval = setInterval(() => {
                        if (audio.volume > 0.1) {
                            audio.volume -= 0.1;
                        } else {
                            audio.volume = 0;
                            clearInterval(fadeInterval);
                            audio.pause();
                            audio.currentTime = 0;
                        }
                    }, 100);
                    return;
                }
                    if (direction === -1 && currentBottom <= -initialOffset) {
                        logos.style.transform = `translateX(-50%) translateY(${initialOffset}px)`;
                        cancelAnimationFrame(animationId);
                        return;
                    }
                    animationId = requestAnimationFrame(animate);
                }
                animate();
            });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const nameParam = urlParams.get('playerName');
        hint.classList.add('show');

        if (nameParam !== null && nameParam !== '') {
            const finalName = nameParam;
            waitingForClick = true;

            document.addEventListener('click', function clickHandler(e) {
                if (waitingForClick) {
                    waitingForClick = false;
                    hint.classList.remove('show');
                    hint.style.display = 'none';
                    start(finalName);
                    document.removeEventListener('click', clickHandler);
                }
            });
        } else {
            document.addEventListener('click', () => {
                if (started) return;
                const playerName = prompt('Enter your name:', 'PLAYERNAME');
                if (playerName === null) return;
                hint.classList.remove('show');
                hint.style.display = 'none';
                const finalName = playerName !== '' ? playerName : 'PLAYERNAME';
                start(finalName);
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                spacePressed = true;
                updateSpeed();
            }
            if (e.key === 'Control') {
                e.preventDefault();
                ctrlPressed = true;
                updateSpeed();
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                direction = -1;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                spacePressed = false;
                updateSpeed();
            }
            if (e.key === 'Control') {
                e.preventDefault();
                ctrlPressed = false;
                updateSpeed();
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                direction = 1;
            }
        });

        window.addEventListener('resize', () => {
            if (started) {
                calculatePoemHeight();
            }
        });

        document.fonts.ready.then(() => {
            initCharMetrics();
        });
    </script>
</body>
</html>
